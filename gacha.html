<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gacha Kelompok - Smart Group Distributor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .main-container {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        color: white;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }

      .header-logo {
        width: 70px;
        height: 70px;
        object-fit: contain;
        filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
        animation: float 3s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .header-content {
        text-align: center;
      }

      header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      }

      header p {
        font-size: 1em;
        opacity: 0.9;
      }

      @media (max-width: 768px) {
        header {
          flex-direction: column;
          gap: 10px;
        }

        .header-logo {
          width: 30px;
          height: 30px;
        }

        header h1 {
          font-size: 1.8em;
        }
      }

      .content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
      }

      @media (max-width: 768px) {
        .content {
          grid-template-columns: 1fr;
        }
        header h1 {
          font-size: 1.8em;
        }
      }

      .input-section {
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      .config-section {
        grid-column: 1 / -1;
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      @media (max-width: 768px) {
        .config-section {
          grid-template-columns: 1fr;
        }
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
        font-size: 0.95em;
      }

      input[type="number"],
      textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        transition: all 0.3s ease;
      }

      input[type="number"]:focus,
      textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      textarea {
        resize: vertical;
        min-height: 150px;
        max-height: 300px;
      }

      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
        grid-column: 1 / -1;
      }

      button {
        flex: 1;
        padding: 12px 24px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .btn-generate {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      }

      .btn-generate:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
      }

      .btn-generate:active {
        transform: translateY(0);
      }

      .btn-reset {
        background: #f5f5f5;
        color: #333;
        border: 2px solid #e0e0e0;
      }

      .btn-reset:hover {
        background: #efefef;
        border-color: #999;
      }

      .btn-copy {
        background: #4caf50;
        color: white;
        box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        font-size: 0.9em;
        padding: 10px 16px;
      }

      .btn-copy:hover {
        box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
      }

      .stats {
        background: #f0f4ff;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 15px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        font-size: 0.9em;
      }

      .stat-item {
        color: #333;
      }

      .stat-item strong {
        color: #667eea;
      }

      .result-container {
        margin-top: 30px;
      }

      .result-header {
        color: white;
        font-size: 1.5em;
        margin-bottom: 20px;
        text-align: center;
      }

      .groups-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 15px;
      }

      .group {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        border-top: 4px solid;
        border-top-color: var(--group-color, #667eea);
        transition: all 0.3s ease;
      }

      .group:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      }

      .group-header {
        font-weight: 700;
        font-size: 1.1em;
        margin-bottom: 15px;
        color: #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .group-member-count {
        background: #f0f4ff;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.85em;
        color: #667eea;
        font-weight: 600;
      }

      .group-members {
        list-style: none;
      }

      .group-member {
        padding: 10px 12px;
        margin-bottom: 8px;
        background: #f9f9f9;
        border-radius: 6px;
        font-size: 0.95em;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s ease;
      }

      .group-member:hover {
        background: #f0f4ff;
      }

      .member-jago {
        background: #fff3e0;
        font-weight: 600;
        color: #e65100;
      }

      .member-jago::before {
        content: "⭐";
        font-size: 1.1em;
      }

      .member-biasa::before {
        content: "👤";
        font-size: 1em;
        opacity: 0.7;
      }

      .info-box {
        background: #e3f2fd;
        border-left: 4px solid #2196f3;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        color: #1565c0;
        font-size: 0.95em;
      }

      .info-box strong {
        color: #0d47a1;
      }

      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #999;
      }

      .empty-state-icon {
        font-size: 3em;
        margin-bottom: 10px;
      }

      .color-palette {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .color-option {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition: all 0.2s ease;
      }

      .color-option:hover {
        transform: scale(1.2);
      }

      .color-option.active {
        border-color: #333;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .group {
        animation: slideIn 0.3s ease forwards;
      }

      .group:nth-child(1) {
        animation-delay: 0.05s;
      }
      .group:nth-child(2) {
        animation-delay: 0.1s;
      }
      .group:nth-child(3) {
        animation-delay: 0.15s;
      }
      .group:nth-child(4) {
        animation-delay: 0.2s;
      }
      .group:nth-child(5) {
        animation-delay: 0.25s;
      }
      .group:nth-child(n + 6) {
        animation-delay: 0.3s;
      }

      .notification {
        position: fixed;
        top: 20px;
        right: 20px;
        background: white;
        padding: 15px 20px;
        border-radius: 8px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        animation: slideIn 0.3s ease;
        z-index: 1000;
      }

      .notification.success {
        border-left: 4px solid #4caf50;
        color: #2e7d32;
      }

      .notification.error {
        border-left: 4px solid #f44336;
        color: #c62828;
      }

      .notification.info {
        border-left: 4px solid #2196f3;
        color: #1565c0;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <header>
        <img src="assets/Logo.png" alt="Logo Gacha" class="header-logo" />
        <div class="header-content">
          <h1>Gacha Kelompok - by Bagas</h1>
        </div>
      </header>

      <div class="config-section">
        <div>
          <label for="groupSize">📊 Jumlah Anggota per Kelompok</label>
          <input
            type="number"
            id="groupSize"
            placeholder="Contoh: 3 atau 4"
            min="1"
          />
          <div class="stats" style="margin-top: 10px">
            <div class="stat-item">
              Total Murid: <strong id="totalMurid">0</strong>
            </div>
            <div class="stat-item">
              Total Kelompok: <strong id="totalKelompok">0</strong>
            </div>
          </div>
        </div>

        <div>
          <label>🎨 Warna Tema Kelompok</label>
          <div class="color-palette">
            <div
              class="color-option active"
              style="background: #667eea"
              onclick="setThemeColor('#667eea', this)"
            ></div>
            <div
              class="color-option"
              style="background: #764ba2"
              onclick="setThemeColor('#764ba2', this)"
            ></div>
            <div
              class="color-option"
              style="background: #f093fb"
              onclick="setThemeColor('#f093fb', this)"
            ></div>
            <div
              class="color-option"
              style="background: #4facfe"
              onclick="setThemeColor('#4facfe', this)"
            ></div>
            <div
              class="color-option"
              style="background: #43e97b"
              onclick="setThemeColor('#43e97b', this)"
            ></div>
            <div
              class="color-option"
              style="background: #fa709a"
              onclick="setThemeColor('#fa709a', this)"
            ></div>
            <div
              class="color-option"
              style="background: #feca57"
              onclick="setThemeColor('#feca57', this)"
            ></div>
            <div
              class="color-option"
              style="background: #48dbfb"
              onclick="setThemeColor('#48dbfb', this)"
            ></div>
          </div>
        </div>
      </div>

      <div class="content">
        <div class="input-section">
          <label for="biasa">👥 Murid Biasa (Pisah dengan Enter)</label>
          <textarea
            id="biasa"
            placeholder="Contoh:
Budi
Andi
Siti
Roni
Lina"
          ></textarea>
        </div>

        <div class="input-section">
          <label for="jago">⭐ Murid Jago/Unggulan (Pisah dengan Enter)</label>
          <textarea
            id="jago"
            placeholder="Kosongkan jika tidak ada
Atau contoh:
Raka
Dimas
Tara"
          ></textarea>
        </div>
      </div>

      <div class="button-group">
        <button class="btn-generate" onclick="generate()">
          🚀 Generate Kelompok
        </button>
        <button class="btn-reset" onclick="resetAll()">🔄 Reset Semua</button>
      </div>

      <div class="result-container">
        <div id="result"></div>
      </div>
    </div>

    <script>
      const STORAGE_KEY = "gachaData";
      let themeColor = "#667eea";

      function saveToStorage() {
        const data = {
          groupSize: document.getElementById("groupSize").value,
          biasa: document.getElementById("biasa").value,
          jago: document.getElementById("jago").value,
          themeColor: themeColor,
          timestamp: new Date().toISOString(),
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function loadFromStorage() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
          try {
            const parsed = JSON.parse(data);
            document.getElementById("groupSize").value = parsed.groupSize || "";
            document.getElementById("biasa").value = parsed.biasa || "";
            document.getElementById("jago").value = parsed.jago || "";
            themeColor = parsed.themeColor || "#667eea";

            document.querySelectorAll(".color-option").forEach((el) => {
              el.classList.remove("active");
              if (el.style.background === themeColor) {
                el.classList.add("active");
              }
            });

            showNotification(`Berhasil memuat data cache`, "info");
          } catch (e) {
            console.error("Error loading cache:", e);
          }
        }
      }

      function setThemeColor(color, element) {
        themeColor = color;
        document
          .querySelectorAll(".color-option")
          .forEach((el) => el.classList.remove("active"));
        element.classList.add("active");
        saveToStorage();
      }

      function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function showNotification(message, type = "info") {
        const notification = document.createElement("div");
        notification.className = `notification ${type}`;
        notification.textContent = message;
        document.body.appendChild(notification);

        setTimeout(() => {
          notification.remove();
        }, 3000);
      }

      function distributeMembers(members, groupCount, groupSize) {
        const groups = Array.from({ length: groupCount }, () => []);
        const shuffled = shuffle(members);

        const totalMembers = shuffled.length;
        const baseSize = Math.floor(totalMembers / groupCount);
        const remainder = totalMembers % groupCount;

        let memberIndex = 0;

        for (let i = 0; i < groupCount; i++) {
          const sizeForThisGroup = i < remainder ? baseSize + 1 : baseSize;
          for (let j = 0; j < sizeForThisGroup; j++) {
            if (memberIndex < shuffled.length) {
              groups[i].push(shuffled[memberIndex]);
              memberIndex++;
            }
          }
        }

        return groups;
      }

      function generate() {
        const groupSize = parseInt(document.getElementById("groupSize").value);

        if (!groupSize || groupSize <= 0) {
          showNotification(
            "⚠️ Isi jumlah anggota per kelompok dengan benar!",
            "error",
          );
          return;
        }

        const biasaInput = document.getElementById("biasa").value.trim();
        const jagoInput = document.getElementById("jago").value.trim();

        let biasa = biasaInput.split("\n").filter((x) => x.trim() !== "");
        let jago = jagoInput.split("\n").filter((x) => x.trim() !== "");

        if (biasa.length === 0) {
          showNotification("❌ Minimal harus ada 1 murid!", "error");
          return;
        }

        biasa = shuffle(biasa);
        jago = shuffle(jago);

        const totalMurid = biasa.length + jago.length;
        const totalGroup = Math.ceil(totalMurid / groupSize);

        let groups = Array.from({ length: totalGroup }, () => []);

        if (jago.length > 0) {
          const jagoDistributed = Math.min(jago.length, totalGroup);
          for (let i = 0; i < jagoDistributed; i++) {
            groups[i].push({ name: jago[i], isJago: true });
          }

          for (let i = jagoDistributed; i < jago.length; i++) {
            const randomGroupIdx = Math.floor(Math.random() * totalGroup);
            groups[randomGroupIdx].push({ name: jago[i], isJago: true });
          }
        }

        const biasaDistributed = distributeMembers(
          biasa,
          totalGroup,
          groupSize,
        );

        for (let i = 0; i < totalGroup; i++) {
          for (let member of biasaDistributed[i]) {
            groups[i].push(member);
          }
        }

        document.getElementById("totalMurid").textContent = totalMurid;
        document.getElementById("totalKelompok").textContent = totalGroup;

        displayResults(groups);

        saveToStorage();

        showNotification(
          `✅ Berhasil generate ${totalGroup} kelompok!`,
          "success",
        );
      }

      function displayResults(groups) {
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "";

        if (groups.length === 0) {
          resultDiv.innerHTML = `<div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <p>Belum ada hasil. Isi data dan klik Generate Kelompok!</p>
          </div>`;
          return;
        }

        const resultHeader = document.createElement("div");
        resultHeader.className = "result-header";
        resultHeader.innerHTML = `📋 Hasil Pembagian Kelompok`;
        resultDiv.appendChild(resultHeader);

        const groupsGrid = document.createElement("div");
        groupsGrid.className = "groups-grid";

        groups.forEach((group, index) => {
          const groupEl = document.createElement("div");
          groupEl.className = "group";
          groupEl.style.setProperty("--group-color", themeColor);

          let headerHtml = `<div class="group-header">
            <span>Kelompok ${index + 1}</span>
            <span class="group-member-count">${group.length} anggota</span>
          </div>`;

          let membersHtml = '<ul class="group-members">';
          group.forEach((member) => {
            if (typeof member === "object" && member.isJago) {
              membersHtml += `<li class="group-member member-jago">${member.name}</li>`;
            } else {
              membersHtml += `<li class="group-member member-biasa">${member}</li>`;
            }
          });
          membersHtml += "</ul>";

          groupEl.innerHTML = headerHtml + membersHtml;
          groupsGrid.appendChild(groupEl);
        });

        const infoBox = document.createElement("div");
        infoBox.className = "info-box";
        infoBox.innerHTML = `
          <strong>💡 Info:</strong> ⭐ = Murid Jago | 👤 = Murid Biasa. 
        `;

        resultDiv.appendChild(infoBox);
        resultDiv.appendChild(groupsGrid);
      }

      function resetAll() {
        if (confirm("Hapus semua data termasuk cache?")) {
          document.getElementById("groupSize").value = "";
          document.getElementById("biasa").value = "";
          document.getElementById("jago").value = "";
          document.getElementById("result").innerHTML = "";
          document.getElementById("totalMurid").textContent = "0";
          document.getElementById("totalKelompok").textContent = "0";
          localStorage.removeItem(STORAGE_KEY);
          showNotification("🗑️ Semua data telah dihapus", "info");
        }
      }

      document
        .getElementById("groupSize")
        .addEventListener("change", saveToStorage);
      document.getElementById("biasa").addEventListener("input", saveToStorage);
      document.getElementById("jago").addEventListener("input", saveToStorage);

      window.addEventListener("DOMContentLoaded", () => {
        loadFromStorage();
      });

      window.addEventListener("beforeunload", () => {
        saveToStorage();
      });
    </script>
  </body>
</html>
